# SportSync local development stack.
# All services run together for local development.

services:
  # PostgreSQL database for persistent storage
  postgres:
    image: postgres:16-alpine
    container_name: sportsync-postgres
    environment:
      POSTGRES_DB: sportsync
      POSTGRES_USER: sportsync_user
      POSTGRES_PASSWORD: sportsync_local_password
    ports:
      - "${POSTGRES_PUBLISHED_PORT:-5432}:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U sportsync_user -d sportsync"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - sportsync-network

  # Redis for caching, pub/sub, sessions, and rate limiting
  redis:
    image: redis:7-alpine
    container_name: sportsync-redis
    ports:
      - "${REDIS_PUBLISHED_PORT:-6379}:6379"
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - sportsync-network

  # MinIO provides S3-compatible object storage for local avatar and asset verification
  minio:
    image: minio/minio:latest
    container_name: sportsync-minio
    environment:
      MINIO_ROOT_USER: minioadmin
      MINIO_ROOT_PASSWORD: minioadmin123
    command: server /data --console-address ":9001"
    ports:
      - "${MINIO_API_PUBLISHED_PORT:-9000}:9000"
      - "${MINIO_CONSOLE_PUBLISHED_PORT:-9001}:9001"
    volumes:
      - minio_data:/data
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:9000/minio/health/live"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - sportsync-network

  minio-init:
    image: minio/mc:latest
    container_name: sportsync-minio-init
    depends_on:
      minio:
        condition: service_healthy
    entrypoint: >
      /bin/sh -c "
      mc alias set local http://minio:9000 minioadmin minioadmin123 &&
      mc mb --ignore-existing local/sportsync-assets &&
      mc anonymous set download local/sportsync-assets &&
      exit 0
      "
    networks:
      - sportsync-network

  # Python FastAPI service for REST API, auth, and ML
  api:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: sportsync-api
    env_file:
      - ./backend/.env
    environment:
      DATABASE_URL: postgresql://sportsync_user:sportsync_local_password@postgres:5432/sportsync
      REDIS_URL: redis://redis:6379
      REDIS_CHANNEL_LIVE_SCORES: scores:live
      ENVIRONMENT: development
      AWS_REGION: us-east-1
      AWS_S3_BUCKET: sportsync-assets
      AWS_ACCESS_KEY_ID: minioadmin
      AWS_SECRET_ACCESS_KEY: minioadmin123
      AWS_S3_ENDPOINT_URL: http://minio:9000
      AWS_S3_PUBLIC_BASE_URL: http://127.0.0.1:${MINIO_API_PUBLISHED_PORT:-9000}/sportsync-assets
      AWS_S3_USE_PATH_STYLE: "true"
    ports:
      - "${API_PUBLISHED_PORT:-8000}:8000"
    volumes:
      - ./backend:/app
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      minio-init:
        condition: service_completed_successfully
    healthcheck:
      test:
        [
          "CMD",
          "python",
          "-c",
          "import urllib.request; urllib.request.urlopen('http://localhost:8000/api/health')",
        ]
      interval: 15s
      timeout: 5s
      retries: 5
    networks:
      - sportsync-network

  # Go Gin service for WebSocket real-time connections
  realtime:
    build:
      context: ./realtime
      dockerfile: Dockerfile
    container_name: sportsync-realtime
    env_file:
      - ./backend/.env
    environment:
      REDIS_URL: redis://redis:6379
      REDIS_CHANNEL_LIVE_SCORES: scores:live
    ports:
      - "${REALTIME_PUBLISHED_PORT:-8080}:8080"
    depends_on:
      redis:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "wget", "-q", "-O", "-", "http://localhost:8080/health"]
      interval: 15s
      timeout: 5s
      retries: 5
    networks:
      - sportsync-network

  # Nginx reverse proxy routing traffic to services
  nginx:
    build:
      context: .
      dockerfile: nginx/Dockerfile
    container_name: sportsync-nginx
    ports:
      - "${NGINX_HTTP_PUBLISHED_PORT:-80}:80"
    depends_on:
      api:
        condition: service_healthy
      realtime:
        condition: service_healthy
    networks:
      - sportsync-network

volumes:
  postgres_data:
  redis_data:
  minio_data:

networks:
  sportsync-network:
    driver: bridge
