# SportSync Local Development - Docker Compose
# All services run together for local development

version: "3.9"

services:
  # PostgreSQL database for persistent storage
  postgres:
    image: postgres:16-alpine
    container_name: sportsync-postgres
    environment:
      POSTGRES_DB: sportsync
      POSTGRES_USER: sportsync_user
      POSTGRES_PASSWORD: sportsync_local_password
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U sportsync_user -d sportsync"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - sportsync-network

  # Redis for caching, pub/sub, sessions, and rate limiting
  redis:
    image: redis:7-alpine
    container_name: sportsync-redis
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - sportsync-network

  # Python FastAPI service for REST API, auth, and ML
  api:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: sportsync-api
    env_file:
      - .env
    environment:
      DATABASE_URL: postgresql://sportsync_user:sportsync_local_password@postgres:5432/sportsync
      REDIS_URL: redis://redis:6379
      ENVIRONMENT: development
    ports:
      - "8000:8000"
    volumes:
      - ./backend:/app
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    networks:
      - sportsync-network

  # Go Gin service for WebSocket real-time connections
  realtime:
    build:
      context: ./realtime
      dockerfile: Dockerfile
    container_name: sportsync-realtime
    env_file:
      - .env
    environment:
      REDIS_URL: redis://redis:6379
    ports:
      - "8080:8080"
    depends_on:
      redis:
        condition: service_healthy
    networks:
      - sportsync-network

  # Nginx reverse proxy routing traffic to services
  nginx:
    image: nginx:alpine
    container_name: sportsync-nginx
    ports:
      - "80:80"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf:ro
    depends_on:
      - api
      - realtime
    networks:
      - sportsync-network

volumes:
  postgres_data:
  redis_data:

networks:
  sportsync-network:
    driver: bridge
