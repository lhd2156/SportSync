# SportSync Production - Docker Compose Overrides
# Extends docker-compose.yml with production settings

version: "3.9"

services:
  # Production API runs as non-root with no volume mounts
  api:
    volumes: []
    environment:
      ENVIRONMENT: production
    restart: always
    user: "1000:1000"

  # Production realtime runs as non-root
  realtime:
    restart: always
    user: "1000:1000"

  # Production Nginx serves SSL and frontend static build
  nginx:
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./nginx/ssl:/etc/nginx/ssl:ro
    restart: always

  # Production PostgreSQL with persistent volume and restart policy
  postgres:
    restart: always

  # Production Redis with persistence enabled
  redis:
    command: redis-server --save 60 1 --loglevel warning
    restart: always
