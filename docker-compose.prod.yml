# SportSync Production - Docker Compose Overrides
# Extends docker-compose.yml with production settings

services:
  # Production API runs as non-root with no volume mounts
  api:
    volumes: !override []
    env_file:
      - ./.env
    ports: !override
      - "127.0.0.1:8001:8000"
    environment:
      DATABASE_URL: ${DATABASE_URL}
      REDIS_URL: ${REDIS_URL}
      REDIS_CHANNEL_LIVE_SCORES: ${REDIS_CHANNEL_LIVE_SCORES:-scores:live}
      ENVIRONMENT: production
      AWS_REGION: ${AWS_REGION:-us-east-1}
      AWS_S3_BUCKET: ${AWS_S3_BUCKET:-}
      AWS_ACCESS_KEY_ID: ${AWS_ACCESS_KEY_ID:-}
      AWS_SECRET_ACCESS_KEY: ${AWS_SECRET_ACCESS_KEY:-}
      AWS_S3_ENDPOINT_URL: ${AWS_S3_ENDPOINT_URL:-}
      AWS_S3_PUBLIC_BASE_URL: ${AWS_S3_PUBLIC_BASE_URL:-}
      AWS_S3_USE_PATH_STYLE: ${AWS_S3_USE_PATH_STYLE:-false}
    restart: always

  # Production realtime runs as non-root
  realtime:
    env_file:
      - ./.env
    ports: !override
      - "127.0.0.1:8081:8080"
    environment:
      REDIS_URL: ${REDIS_URL}
      REDIS_CHANNEL_LIVE_SCORES: ${REDIS_CHANNEL_LIVE_SCORES:-scores:live}
      JWT_SECRET: ${JWT_SECRET}
      CORS_ORIGINS: ${CORS_ORIGINS}
      PRODUCTION_DOMAIN: ${PRODUCTION_DOMAIN}
    restart: always

  # Production Nginx serves SSL and frontend static build
  nginx:
    ports: !override
      - "80:80"
      - "443:443"
    volumes:
      - ./letsencrypt:/etc/letsencrypt:ro
    environment:
      TLS_DOMAIN: ${TLS_DOMAIN:-onsportsync.com}
    restart: always

  # Production PostgreSQL with persistent volume and restart policy
  postgres:
    ports: !override
      - "127.0.0.1:5433:5432"
    restart: always

  # Production Redis with persistence enabled
  redis:
    ports: !override
      - "127.0.0.1:6380:6379"
    command: redis-server --save 60 1 --loglevel warning
    restart: always

  # Production uses AWS S3; never expose local MinIO ports publicly
  minio:
    ports: !override
      - "127.0.0.1:9000:9000"
      - "127.0.0.1:9001:9001"
