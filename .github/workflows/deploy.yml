name: SportSync CI/CD

on:
  push:
    branches: [main, dev, predeploy-final]
  pull_request:
    branches: [main, dev]
  workflow_dispatch:

jobs:
  test-backend:
    name: Backend Tests
    runs-on: ubuntu-latest

    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_DB: sportsync_test
          POSTGRES_USER: sportsync
          POSTGRES_PASSWORD: test_password
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

      redis:
        image: redis:7-alpine
        ports:
          - 6379:6379
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        working-directory: backend
        run: |
          pip install --upgrade pip
          pip install -r requirements.txt
          pip install pytest pytest-asyncio httpx

      - name: Run pytest suite
        working-directory: backend
        env:
          DATABASE_URL: postgresql://sportsync:test_password@localhost:5432/sportsync_test
          REDIS_URL: redis://localhost:6379
          REDIS_CHANNEL_LIVE_SCORES: scores:live
          JWT_SECRET: ci-test-secret-key-minimum-32-characters-long
          JWT_ALGORITHM: HS256
          ENVIRONMENT: test
        run: pytest tests/ -v --tb=short

  test-realtime:
    name: Realtime Build
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: "1.22"

      - name: Run Go tests
        working-directory: realtime
        run: go test ./...

      - name: Build realtime service
        working-directory: realtime
        run: go build ./...

  validate-docker:
    name: Docker Validation
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Validate docker compose
        run: docker compose config

      - name: Validate nginx config
        run: |
          mkdir -p /tmp/nginx-ssl
          mkdir -p /tmp/nginx-includes
          cp "${{ github.workspace }}/nginx/includes/api-allowlist.conf" /tmp/nginx-includes/api-allowlist.conf
          openssl req -x509 -nodes -newkey rsa:2048 \
            -keyout /tmp/nginx-ssl/privkey.pem \
            -out /tmp/nginx-ssl/fullchain.pem \
            -days 1 \
            -subj "/CN=localhost"
          docker run --rm \
            --add-host api:127.0.0.1 \
            --add-host realtime:127.0.0.1 \
            -v "/tmp/nginx-ssl:/etc/nginx/ssl:ro" \
            -v "/tmp/nginx-includes:/etc/nginx/includes:ro" \
            -v "${{ github.workspace }}/nginx/nginx.conf:/etc/nginx/nginx.conf:ro" \
            nginx:alpine nginx -t
          docker run --rm \
            --add-host api:127.0.0.1 \
            --add-host realtime:127.0.0.1 \
            -v "/tmp/nginx-includes:/etc/nginx/includes:ro" \
            -v "${{ github.workspace }}/nginx/nginx.http.conf:/etc/nginx/nginx.conf:ro" \
            nginx:alpine nginx -t

      - name: Build API and realtime images
        run: |
          docker build -t sportsync-api-ci ./backend
          docker build -t sportsync-realtime-ci ./realtime
          docker build -t sportsync-nginx-ci -f nginx/Dockerfile .

  build-frontend:
    name: Frontend Build
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Install dependencies
        working-directory: frontend
        run: npm ci

      - name: Build frontend
        working-directory: frontend
        env:
          VITE_GOOGLE_CLIENT_ID: placeholder
        run: npm run build

  deploy:
    name: Deploy to AWS ECS
    runs-on: ubuntu-latest
    needs: [test-backend, test-realtime, validate-docker, build-frontend]
    if: github.event_name == 'workflow_dispatch' || (github.event_name == 'push' && (github.ref == 'refs/heads/main' || github.ref == 'refs/heads/predeploy-final'))
    env:
      AWS_REGION: us-east-1
      STATIC_BUCKET: ${{ secrets.AWS_S3_BUCKET }}
      VITE_ASSET_BASE_URL: ${{ secrets.VITE_ASSET_BASE_URL }}
      VITE_GOOGLE_CLIENT_ID: ${{ secrets.GOOGLE_CLIENT_ID }}
      ECS_CLUSTER: sportsync-cluster
      ECS_API_SERVICE: ${{ vars.ECS_API_SERVICE }}
      ECS_REALTIME_SERVICE: ${{ vars.ECS_REALTIME_SERVICE }}
      ECS_NGINX_SERVICE: ${{ vars.ECS_NGINX_SERVICE }}
      ECR_API_REPOSITORY: sportsync-api
      ECR_REALTIME_REPOSITORY: sportsync-realtime
      ECR_NGINX_REPOSITORY: sportsync-nginx

    steps:
      - uses: actions/checkout@v4

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Login to Amazon ECR
        id: ecr-login
        uses: aws-actions/amazon-ecr-login@v2

      - name: Ensure ECR repositories exist
        run: |
          set -euo pipefail
          for repo in "$ECR_API_REPOSITORY" "$ECR_REALTIME_REPOSITORY" "$ECR_NGINX_REPOSITORY"; do
            aws ecr describe-repositories --repository-names "$repo" --region "$AWS_REGION" >/dev/null 2>&1 || \
              aws ecr create-repository \
                --repository-name "$repo" \
                --image-scanning-configuration scanOnPush=true \
                --region "$AWS_REGION" >/dev/null
          done

      - name: Ensure ECS cluster exists
        if: env.ECS_CLUSTER != ''
        run: |
          set -euo pipefail
          aws ecs describe-clusters --clusters "$ECS_CLUSTER" --region "$AWS_REGION" >/tmp/ecs-cluster.json
          if ! grep -q "\"clusterName\": \"$ECS_CLUSTER\"" /tmp/ecs-cluster.json; then
            aws ecs create-cluster --cluster-name "$ECS_CLUSTER" --region "$AWS_REGION" >/dev/null
          fi

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Build frontend for deploy
        working-directory: frontend
        run: |
          npm ci
          if [ -z "$VITE_GOOGLE_CLIENT_ID" ]; then export VITE_GOOGLE_CLIENT_ID=placeholder; fi
          npm run build

      - name: Sync static assets to S3
        if: env.STATIC_BUCKET != ''
        run: aws s3 sync frontend/dist "s3://$STATIC_BUCKET" --delete

      - name: Build and push API image
        env:
          ECR_REGISTRY: ${{ steps.ecr-login.outputs.registry }}
        run: |
          set -euo pipefail
          docker build \
            -t $ECR_REGISTRY/$ECR_API_REPOSITORY:${GITHUB_SHA} \
            -t $ECR_REGISTRY/$ECR_API_REPOSITORY:latest \
            ./backend
          docker push $ECR_REGISTRY/$ECR_API_REPOSITORY:${GITHUB_SHA}
          docker push $ECR_REGISTRY/$ECR_API_REPOSITORY:latest

      - name: Build and push realtime image
        env:
          ECR_REGISTRY: ${{ steps.ecr-login.outputs.registry }}
        run: |
          set -euo pipefail
          docker build \
            -t $ECR_REGISTRY/$ECR_REALTIME_REPOSITORY:${GITHUB_SHA} \
            -t $ECR_REGISTRY/$ECR_REALTIME_REPOSITORY:latest \
            ./realtime
          docker push $ECR_REGISTRY/$ECR_REALTIME_REPOSITORY:${GITHUB_SHA}
          docker push $ECR_REGISTRY/$ECR_REALTIME_REPOSITORY:latest

      - name: Build and push nginx image
        env:
          ECR_REGISTRY: ${{ steps.ecr-login.outputs.registry }}
        run: |
          set -euo pipefail
          docker build \
            -t $ECR_REGISTRY/$ECR_NGINX_REPOSITORY:${GITHUB_SHA} \
            -t $ECR_REGISTRY/$ECR_NGINX_REPOSITORY:latest \
            -f nginx/Dockerfile .
          docker push $ECR_REGISTRY/$ECR_NGINX_REPOSITORY:${GITHUB_SHA}
          docker push $ECR_REGISTRY/$ECR_NGINX_REPOSITORY:latest

      - name: Update ECS services
        if: env.ECS_CLUSTER != ''
        run: |
          set -euo pipefail
          updated=0
          for service in "$ECS_API_SERVICE" "$ECS_REALTIME_SERVICE" "$ECS_NGINX_SERVICE"; do
            if [ -n "$service" ]; then
              aws ecs update-service \
                --cluster "$ECS_CLUSTER" \
                --service "$service" \
                --force-new-deployment \
                --region "$AWS_REGION" >/dev/null
              updated=1
            fi
          done

          if [ "$updated" -eq 0 ]; then
            echo "ECS cluster exists but no ECS_*_SERVICE variables are configured; skipping rollout."
          fi
