# SportSync CI/CD Pipeline
#
# Runs Pytest on push to dev/main, builds frontend, deploys to AWS ECS on main.
# Per blueprint Section 17 Day 3 and Section 19.

name: SportSync CI/CD

on:
  push:
    branches: [main, dev]
  pull_request:
    branches: [main, dev]

jobs:
  # Backend tests with PostgreSQL and Redis services
  test-backend:
    name: Backend Tests
    runs-on: ubuntu-latest

    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_DB: sportsync_test
          POSTGRES_USER: sportsync
          POSTGRES_PASSWORD: test_password
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

      redis:
        image: redis:7-alpine
        ports:
          - 6379:6379
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        working-directory: backend
        run: |
          pip install --upgrade pip
          pip install -r requirements.txt
          pip install pytest pytest-asyncio httpx

      - name: Run Pytest suite
        working-directory: backend
        env:
          DATABASE_URL: postgresql://sportsync:test_password@localhost:5432/sportsync_test
          REDIS_URL: redis://localhost:6379
          JWT_SECRET: ci-test-secret-key-minimum-32-characters-long
          JWT_ALGORITHM: HS256
          ENVIRONMENT: test
        run: pytest tests/ -v --tb=short

  # Frontend type check and production build
  build-frontend:
    name: Frontend Build
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Install dependencies
        working-directory: frontend
        run: npm ci

      - name: Build
        working-directory: frontend
        env:
          VITE_API_BASE_URL: http://localhost:8000
          VITE_WS_URL: ws://localhost:8080
          VITE_GOOGLE_CLIENT_ID: placeholder
        run: npm run build

  # Deploy to AWS ECS — only on main push after tests pass
  deploy:
    name: Deploy to AWS ECS
    runs-on: ubuntu-latest
    needs: [test-backend, build-frontend]
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'

    steps:
      - uses: actions/checkout@v4

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: us-east-1

      - name: Login to Amazon ECR
        id: ecr-login
        uses: aws-actions/amazon-ecr-login@v2

      - name: Build and push API image
        env:
          ECR_REGISTRY: ${{ steps.ecr-login.outputs.registry }}
        run: |
          docker build -t $ECR_REGISTRY/sportsync-api:latest ./backend
          docker push $ECR_REGISTRY/sportsync-api:latest

      - name: Build and push frontend image
        env:
          ECR_REGISTRY: ${{ steps.ecr-login.outputs.registry }}
        run: |
          docker build -t $ECR_REGISTRY/sportsync-frontend:latest ./frontend
          docker push $ECR_REGISTRY/sportsync-frontend:latest

      - name: Update ECS service
        run: |
          aws ecs update-service \
            --cluster sportsync-cluster \
            --service sportsync-service \
            --force-new-deployment
