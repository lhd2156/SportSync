name: SportSync Deploy

on:
  push:
    branches: [main, predeploy-final]
  workflow_dispatch:

jobs:
  deploy:
    name: Deploy to AWS EC2
    runs-on: ubuntu-latest
    env:
      AWS_REGION: us-east-1
      STATIC_BUCKET: ${{ secrets.AWS_S3_BUCKET }}
      VITE_ASSET_BASE_URL: ${{ secrets.VITE_ASSET_BASE_URL }}
      VITE_GOOGLE_CLIENT_ID: ${{ secrets.GOOGLE_CLIENT_ID }}
      VITE_GOOGLE_ALLOWED_ORIGINS: ${{ vars.VITE_GOOGLE_ALLOWED_ORIGINS }}
      EC2_INSTANCE_ID: ${{ vars.EC2_INSTANCE_ID }}
      EC2_DEPLOY_PATH: ${{ vars.EC2_DEPLOY_PATH }}

    steps:
      - uses: actions/checkout@v4

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Build frontend for deploy
        working-directory: frontend
        run: |
          npm ci
          if [ -z "$VITE_GOOGLE_CLIENT_ID" ]; then export VITE_GOOGLE_CLIENT_ID=placeholder; fi
          if [ -z "$VITE_GOOGLE_ALLOWED_ORIGINS" ]; then export VITE_GOOGLE_ALLOWED_ORIGINS=https://onsportsync.com,https://www.onsportsync.com; fi
          npm run build

      - name: Sync static assets to S3
        if: env.STATIC_BUCKET != ''
        run: aws s3 sync frontend/dist "s3://$STATIC_BUCKET" --delete

      - name: Package application bundle
        run: |
          set -euo pipefail
          git archive --format=tar.gz --output "/tmp/sportsync-${GITHUB_SHA}.tar.gz" HEAD

      - name: Upload deploy bundle
        run: |
          set -euo pipefail
          if [ -z "$STATIC_BUCKET" ]; then
            echo "AWS_S3_BUCKET secret is required for EC2 deployment."
            exit 1
          fi
          aws s3 cp "/tmp/sportsync-${GITHUB_SHA}.tar.gz" "s3://$STATIC_BUCKET/deployments/${GITHUB_SHA}.tar.gz"

      - name: Verify EC2 and SSM are ready
        run: |
          set -euo pipefail

          if [ -z "$EC2_INSTANCE_ID" ]; then
            echo "EC2_INSTANCE_ID repository variable must be configured."
            exit 1
          fi

          echo "Waiting for EC2 status checks to pass..."
          aws ec2 wait instance-status-ok \
            --region "$AWS_REGION" \
            --instance-ids "$EC2_INSTANCE_ID"

          echo "Waiting for SSM agent to report Online..."
          ATTEMPTS=0
          MAX_ATTEMPTS=36
          SLEEP_SECONDS=10
          SSM_STATUS=""

          while [ "$ATTEMPTS" -lt "$MAX_ATTEMPTS" ]; do
            SSM_STATUS=$(aws ssm describe-instance-information \
              --region "$AWS_REGION" \
              --filters "Key=InstanceIds,Values=$EC2_INSTANCE_ID" \
              --query 'InstanceInformationList[0].PingStatus' \
              --output text 2>/dev/null || echo "Unknown")

            echo "SSM ping status: $SSM_STATUS"

            if [ "$SSM_STATUS" = "Online" ]; then
              break
            fi

            sleep "$SLEEP_SECONDS"
            ATTEMPTS=$((ATTEMPTS + 1))
          done

          if [ "$SSM_STATUS" != "Online" ]; then
            echo "SSM agent is not Online on instance $EC2_INSTANCE_ID."
            aws ssm describe-instance-information \
              --region "$AWS_REGION" \
              --filters "Key=InstanceIds,Values=$EC2_INSTANCE_ID" || true
            exit 1
          fi

      - name: Deploy to EC2 through SSM
        run: |
          set -euo pipefail

          if [ -z "$EC2_INSTANCE_ID" ] || [ -z "$EC2_DEPLOY_PATH" ]; then
            echo "EC2_INSTANCE_ID and EC2_DEPLOY_PATH repository variables must be configured."
            exit 1
          fi

          python - <<'PY'
          import json
          import os
          from pathlib import Path

          deploy_path = os.environ["EC2_DEPLOY_PATH"]
          bucket = os.environ["STATIC_BUCKET"]
          sha = os.environ["GITHUB_SHA"]

          commands = [
              "set -euo pipefail",
              "mkdir -p /tmp/sportsync-deploy",
              f"aws s3 cp 's3://{bucket}/deployments/{sha}.tar.gz' '/tmp/sportsync-deploy/app.tar.gz'",
              f"mkdir -p '{deploy_path}'",
              f"find '{deploy_path}' -mindepth 1 -maxdepth 1 ! -name '.env' ! -name 'letsencrypt' ! -name 'letsencrypt-lib' -exec rm -rf {{}} +",
              f"tar -xzf '/tmp/sportsync-deploy/app.tar.gz' -C '{deploy_path}'",
              f"cd '{deploy_path}'",
              "docker compose -f docker-compose.yml -f docker-compose.prod.yml build",
              "docker compose -f docker-compose.yml -f docker-compose.prod.yml up -d --remove-orphans",
              "docker image prune -f >/dev/null 2>&1 || true",
          ]

          Path("/tmp/ssm-commands.json").write_text(
              json.dumps({"commands": commands}),
              encoding="utf-8",
          )
          PY

          COMMAND_ID=$(aws ssm send-command \
            --region "$AWS_REGION" \
            --instance-ids "$EC2_INSTANCE_ID" \
            --document-name "AWS-RunShellScript" \
            --parameters file:///tmp/ssm-commands.json \
            --timeout-seconds 3600 \
            --comment "Deploy SportSync ${GITHUB_SHA}" \
            --query 'Command.CommandId' \
            --output text)
          
          ATTEMPTS=0
          MAX_ATTEMPTS=180
          SLEEP_SECONDS=10
          FINAL_STATUS=""
          STUCK_PENDING_COUNT=0

          while [ "$ATTEMPTS" -lt "$MAX_ATTEMPTS" ]; do
            STATUS=$(aws ssm get-command-invocation \
              --region "$AWS_REGION" \
              --command-id "$COMMAND_ID" \
              --instance-id "$EC2_INSTANCE_ID" \
              --query 'Status' \
              --output text 2>/dev/null || echo "Pending")

            echo "SSM command status: $STATUS"

            case "$STATUS" in
              Success)
                FINAL_STATUS="$STATUS"
                break
                ;;
              Cancelled|TimedOut|Failed|Cancelling)
                FINAL_STATUS="$STATUS"
                break
                ;;
              Pending|Delayed|"")
                STUCK_PENDING_COUNT=$((STUCK_PENDING_COUNT + 1))
                if [ "$STUCK_PENDING_COUNT" -ge 12 ]; then
                  echo "Command has been stuck in pending/delayed status for too long. Checking SSM health..."
                  aws ssm describe-instance-information \
                    --region "$AWS_REGION" \
                    --filters "Key=InstanceIds,Values=$EC2_INSTANCE_ID" || true
                fi
                sleep "$SLEEP_SECONDS"
                ATTEMPTS=$((ATTEMPTS + 1))
                ;;
              InProgress)
                STUCK_PENDING_COUNT=0
                sleep "$SLEEP_SECONDS"
                ATTEMPTS=$((ATTEMPTS + 1))
                ;;
              *)
                FINAL_STATUS="$STATUS"
                sleep "$SLEEP_SECONDS"
                ATTEMPTS=$((ATTEMPTS + 1))
                ;;
            esac
          done

          aws ssm get-command-invocation \
            --region "$AWS_REGION" \
            --command-id "$COMMAND_ID" \
            --instance-id "$EC2_INSTANCE_ID" || true

          if [ -z "$FINAL_STATUS" ]; then
            echo "SSM deploy did not finish before timeout."
            exit 1
          fi

          if [ "$FINAL_STATUS" != "Success" ]; then
            echo "SSM deploy finished with status: $FINAL_STATUS"
            exit 1
          fi
